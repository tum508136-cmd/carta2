<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz primer año ❤️</title>
<style>body{
margin:0;
font-family: 'Arial';
background:
linear-gradient(135deg, #2c0102 0%, #f84b4b 99%, #ff9c9c 100%);
color:white;
overflow-x:hidden;
text-align:center;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
margin-top:40px;
}

#carta{
display:none;
padding:20px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.corazon{
position:fixed;
bottom:-20px;
font-size:20px;
animation:subir 6s linear infinite;
}

@keyframes subir{
to{
transform:translateY(-110vh);
opacity:0;
}
}

.mensaje{
display:none;
margin-top:20px;
font-style:italic;
}
</style>
</head>

<body>
    <script>
let clave = prompt("Ingresa la contraseña para ver la carta:");

if(clave !== "ac0211"){
document.body.innerHTML = "<h1>Acceso denegado</h1>";
}
</script>

<h1>💖 un añito y un mesesito 💖</h1>
<h3 id="contador"></h3>


<div id="inicio">
<p>Presiona aquí mi amor</p>
<button onclick="abrir()">Abrir carta 💌</button>
</div>

<div id="carta">
    <img src="carta.jpeg" alt="Carta">
    <a href="carta.jpeg" style="color:#6e1b1b; text-decoration:none; font-weight:700;" align="center"></a>

<button onclick="mensaje()">Toca aquí ❤️</button>

<div class="mensaje" id="msg">
Gracias por este año… te elegiría mil veces más.
</div>

</div>

<script>

function abrir(){
document.getElementById("inicio").style.display="none";
document.getElementById("carta").style.display="block";
setInterval(corazon,300);
}

function corazon(){
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="❤️";
c.style.left=Math.random()*100+"vw";
document.body.appendChild(c);
setTimeout(()=>c.remove(),6000);
}

function mensaje(){
document.getElementById("msg").style.display="block";
}


const inicioRelacion = new Date(2025,1,11); // 11 Febrero 2025

function actualizarContador(){
const hoy = new Date();
const diferencia = hoy - inicioRelacion;
const dias = Math.floor(diferencia / (1000*60*60*24));
document.getElementById("contador").innerHTML =
"💞 Llevamos " + dias + " días juntos 💞";
}

setInterval(actualizarContador,1000);
actualizarContador();


</script>

</body>
</html>
